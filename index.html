<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法使いの約束 - 智慧活動特效計算機</title>
    
    <!-- PWA 必備設定 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c69f53">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="mhyk計算機">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --bg-main: #fcfbfd; 
            --bg-card: #ffffff;
            --text-main: #3a3245; 
            --text-muted: #8b8396;
            --accent-gold: #c69f53; 
            --accent-gold-light: #fbf7ef;
            --border-color: #e5e0eb;
            --border-active: #c69f53;
        }

        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            line-height: 1.6;
            padding: 20px;
            padding-bottom: 80px; 
            margin: 0;
        }

        .header-wrapper { text-align: center; margin-bottom: 40px; margin-top: 20px;}
        .main-title { 
            font-family: 'Noto Serif TC', serif; font-size: 26px; font-weight: 700; 
            color: var(--accent-gold); letter-spacing: 2px; margin-bottom: 5px;
        }
        .main-title::before, .main-title::after { content: ' ✦ '; font-size: 18px; vertical-align: middle; }
        .sub-title { font-size: 12px; letter-spacing: 4px; color: var(--text-muted); text-transform: uppercase; }

        .container { 
            max-width: 850px; margin: 0 auto; background: var(--bg-card); 
            padding: 30px; border-radius: 16px; box-shadow: 0 8px 24px rgba(58, 50, 69, 0.05); 
            border: 1px solid var(--border-color); width: 100%;
        }

        .section { margin-bottom: 30px; }
        .section-title { 
            font-family: 'Noto Serif TC', serif; font-weight: 700; color: var(--text-main); 
            margin-bottom: 20px; font-size: 18px; display: flex; align-items: center;
        }
        .section-title::before { content: '—'; color: var(--accent-gold); margin-right: 10px; font-weight: 400;}
        
        .note { font-size: 13px; color: var(--text-muted); margin-bottom: 12px;}
        
        select { 
            padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); 
            font-size: 14px; color: var(--text-main); background-color: var(--bg-card);
            outline: none; transition: 0.3s; cursor: pointer; width: 100%; max-width: 100%;
        }
        select:focus { border-color: var(--accent-gold); box-shadow: 0 0 0 3px var(--accent-gold-light);}

        /* 工具列 (桌面版) */
        .action-bar { 
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center; 
            background: #f7f5f9; padding: 12px 15px; border-radius: 8px; margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .action-bar-top { display: flex; gap: 10px; align-items: center; }
        .bulk-label { font-size: 13px; font-weight: 600; color: var(--text-main); }
        .bulk-select { width: 120px; padding: 6px; font-size: 13px; }

        .btn-sm { padding: 8px 15px; font-size: 13px; font-weight: 600; border: 1px solid transparent; border-radius: 6px; cursor: pointer; transition: 0.2s;}
        .btn-sm:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { background: transparent; border-color: var(--text-muted); color: var(--text-main); }
        .btn-outline:hover:not(:disabled) { background: #eeeaf1; }
        .btn-gold { background-color: var(--accent-gold); color: white; }
        .btn-gold:hover:not(:disabled) { background-color: #b08d4a; }
        .btn-gold.applied { background-color: #5ab376 !important; }
        .divider { width: 1px; height: 20px; background: var(--border-color); margin: 0 5px; }

        /* 網格 (桌面版) */
        .country-group { margin-bottom: 20px; }
        .country-title { 
            font-weight: 700; color: var(--text-main); margin-bottom: 10px; 
            font-family: 'Noto Serif TC', serif; display: flex; align-items: center;
        }
        .country-title input { margin-right: 8px; accent-color: var(--accent-gold); }
        .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
        
        .char-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--bg-card); padding: 10px 12px; 
            border: 1px solid var(--border-color); border-radius: 8px; transition: 0.2s;
        }
        .char-item.has-bonus { border-color: var(--accent-gold); background-color: var(--accent-gold-light); }
        
        .char-label { display: flex; align-items: center; margin: 0; user-select: none; flex: 1; cursor: pointer;}
        .char-checkbox { width: 16px; height: 16px; margin-right: 10px; cursor: pointer; accent-color: var(--accent-gold);}
        .char-name-block { display: flex; flex-direction: column; line-height: 1.3; }
        .char-jp { font-size: 15px; font-weight: 700; color: var(--text-main); }
        .char-tw { font-size: 12px; font-weight: 400; color: var(--text-muted); margin-top: 1px;}
        
        .char-type-select { width: 105px; font-size: 13px; padding: 6px;}

        /* 槽位 (桌面版) */
        .slot-card { border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-bottom: 15px; background-color: #fcfbfd; }
        .slot-label { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; font-weight: 600; letter-spacing: 1px; }
        .slot-inputs { display: flex; gap: 15px; }
        .slot-inputs > div { flex: 1; min-width: 0; }
        
        /* 計算按鈕 */
        .calc-btn { 
            width: 100%; padding: 16px; background-color: var(--text-main); color: var(--accent-gold); 
            border: 1px solid var(--text-main); border-radius: 12px; font-size: 18px; font-weight: 700; 
            font-family: 'Noto Serif TC', serif; cursor: pointer; transition: 0.3s; margin-top: 10px; letter-spacing: 2px;
        }
        .calc-btn:hover { background-color: #2c2536; color: #dfb96e;}
        
        /* 結果區塊 */
        .result-box { margin-top: 30px; padding: 25px; background-color: var(--accent-gold-light); border: 1px solid var(--accent-gold); border-radius: 12px; text-align: center; }
        .result-title { font-family: 'Noto Serif TC', serif; color: var(--text-main); font-weight: 600; font-size: 16px; margin-bottom: 5px;}
        .result-number { font-size: 42px; font-weight: bold; color: var(--accent-gold); font-family: 'Noto Serif TC', serif;}
        .detail-box { text-align: left; background: var(--bg-card); padding: 15px; border-radius: 8px; font-size: 14px; margin-top: 15px; border: 1px solid var(--border-color); color: var(--text-main); }

        .install-banner { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--text-main); color: white; padding: 15px 20px; box-shadow: 0 -4px 10px rgba(0,0,0,0.15); z-index: 1000; align-items: center; justify-content: space-between; }
        .install-text { font-size: 14px; line-height: 1.4;}
        .install-text strong { color: var(--accent-gold); }
        .install-btn { background-color: var(--accent-gold); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; cursor: pointer; white-space: nowrap; }
        .close-install { background: none; border: none; color: #8b8396; font-size: 20px; padding: 0 0 0 10px; cursor: pointer; }

        .version-tag { text-align: center; color: #b5b0bb; font-size: 14px; margin-top: 40px; font-weight: bold; }

        /* =========================================
           v5.1 手機版平衡排版
           維持手指好點擊的尺寸，但恢復左右並排以節省空間
        ========================================= */
        @media (max-width: 768px) {
            body { padding: 12px; padding-bottom: 90px; }
            .container { padding: 15px; border-radius: 12px; }
            
            /* 標題適度調整，不誇張 */
            .main-title { font-size: 22px; }
            .section-title { font-size: 18px; margin-bottom: 15px; }

            /* 為了防止 iOS 點選時畫面自動放大，font-size 必須維持 16px，但減少 padding */
            select { font-size: 16px !important; padding: 8px 10px; height: auto; }

            /* 工具列：按鈕滿版但間距縮小 */
            .action-bar { flex-direction: column; align-items: stretch; gap: 12px; padding: 15px; }
            .action-bar-top { display: flex; width: 100%; gap: 10px; }
            .action-bar-top > button { flex: 1; padding: 10px; font-size: 14px; } 
            .divider { display: none; }
            
            .bulk-label { font-size: 14px; width: 100%; margin-bottom: -5px; }
            .bulk-select { width: 100% !important; padding: 10px; }
            #applyBulkBtn { padding: 12px; font-size: 16px; width: 100%; }

            /* 角色選擇區塊：恢復左右並排，節省垂直空間 */
            .country-title { font-size: 18px; margin-bottom: 12px; }
            .country-title input { width: 20px; height: 20px; margin-right: 10px; }
            
            .char-grid { display: flex; flex-direction: column; gap: 8px; } /* 改為單欄清單 */
            .char-item { 
                display: flex; /* 恢復左右並排 */
                align-items: center; 
                justify-content: space-between;
                padding: 10px 12px; 
                margin-bottom: 0;
            }
            .char-label { margin-bottom: 0; flex: 1; }
            .char-checkbox { width: 20px; height: 20px; margin-right: 12px; flex-shrink: 0;} 
            
            .char-jp { font-size: 16px; }
            .char-tw { font-size: 12px; }

            /* 單一角色的下拉選單：限制寬度，避免擠壓到名字 */
            .char-type-select { width: 120px !important; font-size: 14px !important; padding: 8px 4px; flex-shrink: 0; }

            /* 槽位區塊：因為文字較長，維持上下獨立行，但縮小間距 */
            .slot-card { padding: 15px; margin-bottom: 15px; }
            .slot-label { font-size: 14px; margin-bottom: 10px; }
            .slot-inputs { display: flex; flex-direction: column; gap: 10px; } 
            .slot-inputs > div { width: 100%; margin-bottom: 0; } 
            
            /* 覺醒目標槽位 */
            .slot-card[style*="display: flex"] { flex-direction: column; align-items: flex-start !important; gap: 10px; }
            .slot-card[style*="display: flex"] > div:first-child { margin-bottom: 0; }
            .slot-card[style*="display: flex"] > div:last-child { width: 100% !important; }

            /* 計算按鈕 */
            .calc-btn { font-size: 18px; padding: 15px; margin-top: 15px; }
            
            /* 結果區塊 */
            .result-box { padding: 25px 15px; }
            .result-number { font-size: 38px; }
        }
    </style>
</head>
<body>

<div class="header-wrapper">
    <div class="main-title">魔法使いの約束</div>
    <div class="sub-title">Event Bonus Calculator</div>
</div>

<div class="container">
    <div class="section">
        <div class="section-title">本次活動特效角色</div>
        <p class="note">※ 勾選框僅為「批次套用工具」。設定完成後角色會亮起底色，套用後會自動取消勾選防誤改。</p>
        
        <div class="action-bar">
            <!-- 手機版這兩個並排，其他全拆開 -->
            <div class="action-bar-top">
                <button id="resetBtn" class="btn-sm btn-outline">↺ 重置清空</button>
                <button id="undoBtn" class="btn-sm btn-outline" disabled>↩ 復原</button>
            </div>
            <div class="divider"></div>
            <span class="bulk-label">將已勾選角色批次設為：</span>
            <select id="bulkTypeSelect" class="bulk-select">
                <option value="g_ssr">扭蛋 SSR</option>
                <option value="g_sr">扭蛋 SR</option>
                <option value="g_r">扭蛋 R</option>
                <option value="r_sr">報酬 SR</option>
                <option value="r_r">報酬 R</option>
            </select>
            <button id="applyBulkBtn" class="btn-sm btn-gold">確認套用</button>
        </div>
        <div id="eventSetupContainer"></div>
    </div>

    <div class="slot-card" style="display: flex; align-items: center; justify-content: space-between; padding: 15px 20px;">
        <div style="font-weight: bold; font-family: 'Noto Serif TC', serif; color: var(--accent-gold); font-size: 16px;">✦ 覺醒角色目標</div>
        <div style="width: 250px;">
            <select id="awakenedStar">
                <option value="5">★★★★ 四星角色 (+5%)</option>
                <option value="3">★★★ 三星角色 (+3%)</option>
            </select>
        </div>
    </div>

    <div class="section" style="margin-top: 30px;">
        <div class="section-title">自己的角色卡（最多 5 張）</div>
        <div id="ownCardsContainer"></div>
    </div>

    <div class="section">
        <div class="section-title">好友支援卡（最多 1 張）</div>
        <p class="note">※ 依據官方規則，好友僅提供基礎加成，不計算上限解放（凸）加成。</p>
        <div class="slot-card" style="background-color: #f4f8fb;">
            <div class="slot-label">槽位 — 好友支援 (不計算突破)</div>
            <div class="slot-inputs">
                <div><select id="friendChar" class="char-select-main"></select></div>
            </div>
        </div>
    </div>

    <button class="calc-btn" onclick="calculateBonus()">計算總特效加成</button>

    <div id="resultArea" class="result-box" style="display: none;">
        <div class="result-title">預計獲得總特效加成</div>
        <div class="result-number" id="finalResult">0%</div>
        <div id="detailResult"></div>
    </div>
</div>

<div class="version-tag">目前版本：v5.0 </div>

<div id="installBanner" class="install-banner">
    <div class="install-text">
        將此計算機 <strong>安裝到手機主畫面</strong><br>
        <span style="font-size: 12px; color: #8b8396;">支援離線使用，無廣告且免開瀏覽器。</span>
    </div>
    <div style="display: flex; align-items: center;">
        <button id="installBtn" class="install-btn">安裝 APP</button>
        <button id="closeInstall" class="close-install">×</button>
    </div>
</div>

<script>
    // ===== PWA 與安裝邏輯 =====
    let deferredPrompt;
    const installBanner = document.getElementById('installBanner');
    const installBtn = document.getElementById('installBtn');
    const closeInstall = document.getElementById('closeInstall');

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Error: ', err));
        });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBanner.style.display = 'flex'; 
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            installBanner.style.display = 'none';
        }
    });

    closeInstall.addEventListener('click', () => { installBanner.style.display = 'none'; });

    // === 核心邏輯 ===
    const roster =[
        { group: "中央の魔法使い", chars:["オズ（奧茲）", "アーサー（亞瑟）", "カイン（凱因）", "リケ（利凱）"] },
        { group: "北の魔法使い", chars:["スノウ（思諾）", "ホワイト（懷特）", "ミスラ（密斯拉）", "オーエン（歐文）", "ブラッドリー（布拉德利）"] },
        { group: "東の魔法使い", chars:["ファウスト（浮士德）", "シノ（西諾）", "ヒースクリフ（希斯克里夫）", "ネロ（尼洛）"] },
        { group: "西の魔法使い", chars:["シャイロック（夏洛克）", "ムル（姆魯）", "クロエ（庫羅耶）", "ラスティカ（拉斯堤卡）"] },
        { group: "南の魔法使い", chars:["フィガロ（費加洛）", "ルチル（路契爾）", "レノックス（雷諾克斯）", "ミチル（米契爾）"] }
    ];

    const cardBaseRates = {
        'g_ssr': { name: '扭蛋 SSR', rate: 10 },
        'g_sr': { name: '扭蛋 SR', rate: 7 },
        'g_r': { name: '扭蛋 R', rate: 3 },
        'r_sr': { name: '報酬 SR', rate: 5 },
        'r_r': { name: '報酬 R', rate: 2 }
    };

    function parseCharName(c) {
        let parts = c.split('（');
        if (parts.length > 1) { return { jp: parts[0], tw: parts[1].replace('）', ''), raw: c }; }
        return { jp: c, tw: "", raw: c };
    }

    let stateHistory =[];
    function saveToHistory() {
        const state = {};
        roster.forEach(g => {
            g.chars.forEach(c => { state[c] = document.getElementById(`event_type_${c}`).value; });
        });
        stateHistory.push(state);
        if (stateHistory.length > 30) stateHistory.shift(); 
        document.getElementById('undoBtn').disabled = false;
    }

    function updateVisuals() {
        roster.forEach(g => {
            g.chars.forEach(c => {
                const sel = document.getElementById(`event_type_${c}`);
                const container = document.getElementById(`item_${c}`);
                if (sel.value !== '0') container.classList.add('has-bonus');
                else container.classList.remove('has-bonus');
            });
        });
        calculateBonus(); 
    }

    const eventSetupContainer = document.getElementById('eventSetupContainer');
    const typeOptionsHTML = `
        <option value="0">無</option>
        <option value="g_ssr">扭蛋 SSR</option>
        <option value="g_sr">扭蛋 SR</option>
        <option value="g_r">扭蛋 R</option>
        <option value="r_sr">報酬 SR</option>
        <option value="r_r">報酬 R</option>
    `;

    let allCharsHTML = '<option value="0">—— 未選擇 ——</option>';

    roster.forEach((g, index) => {
        let groupHTML = `
            <div class="country-group">
                <div class="country-title">
                    <label style="display: flex; align-items: center; margin: 0; cursor: pointer;">
                        <input type="checkbox" class="country-chk" onchange="toggleCountry(${index}, this.checked)">
                        ${g.group}
                    </label>
                </div>
                <div class="char-grid">
        `;
        allCharsHTML += `<optgroup label="${g.group}">`;
        
        g.chars.forEach(c => {
            const parsed = parseCharName(c);
            groupHTML += `
                <div class="char-item" id="item_${c}">
                    <label class="char-label">
                        <input type="checkbox" class="char-chk group-${index}" value="${c}">
                        <div class="char-name-block">
                            <span class="char-jp">${parsed.jp}</span>
                            <span class="char-tw">${parsed.tw}</span>
                        </div>
                    </label>
                    <select id="event_type_${c}" class="char-type-select" onchange="updateVisuals()">
                        ${typeOptionsHTML}
                    </select>
                </div>
            `;
            allCharsHTML += `<option value="${c}">${parsed.jp} ｜ ${parsed.tw}</option>`;
        });
        
        groupHTML += `</div></div>`;
        allCharsHTML += `</optgroup>`;
        eventSetupContainer.innerHTML += groupHTML;
    });

    const levelOptionsHTML = `
        <option value="0">無凸 ✦ SSR Lv.75 ｜ SR Lv.65 ｜ R Lv.55</option>
        <option value="1">1凸 ✦ SSR Lv.80 ｜ SR Lv.70 ｜ R Lv.60</option>
        <option value="2">2凸 ✦ SSR Lv.85 ｜ SR Lv.75 ｜ R Lv.65</option>
        <option value="3">3凸 ✦ SSR Lv.90 ｜ SR Lv.80 ｜ R Lv.70</option>
        <option value="4">4凸 ✦ SSR Lv.95 ｜ SR Lv.85 ｜ R Lv.75</option>
        <option value="5">5凸 ✦ SSR Lv.100 ｜ SR Lv.90 ｜ R Lv.80</option>
    `;

    const ownCardsContainer = document.getElementById('ownCardsContainer');
    for (let i = 1; i <= 5; i++) {
        const roleName = i === 1 ? "底卡" : `育成卡 ${i-1}`;
        ownCardsContainer.innerHTML += `
            <div class="slot-card">
                <div class="slot-label">槽位 ${i}（${roleName}）</div>
                <div class="slot-inputs">
                    <div><select id="ownChar_${i}" class="char-select-main">${allCharsHTML}</select></div>
                    <div><select id="ownLevel_${i}">${levelOptionsHTML}</select></div>
                </div>
            </div>
        `;
    }
    document.getElementById('friendChar').innerHTML = allCharsHTML;

    function toggleCountry(groupIndex, isChecked) {
        document.querySelectorAll(`.char-chk.group-${groupIndex}`).forEach(chk => { chk.checked = isChecked; });
    }

    document.getElementById('applyBulkBtn').onclick = function() {
        const checkboxes = document.querySelectorAll('.char-chk:checked');
        if (checkboxes.length === 0) { alert("請先勾選要套用的角色！"); return; }
        saveToHistory();
        const bulkSelect = document.getElementById('bulkTypeSelect');
        const bulkType = bulkSelect.value;
        checkboxes.forEach(chk => {
            const c = chk.value;
            document.getElementById(`event_type_${c}`).value = bulkType;
            chk.checked = false; 
        });
        document.querySelectorAll('.country-chk').forEach(c => c.checked = false);
        updateVisuals(); 
        const btn = this; const originalText = "確認套用";
        btn.innerText = "✔ 套用完成！"; btn.classList.add('applied');
        if (bulkSelect.selectedIndex < bulkSelect.options.length - 1) bulkSelect.selectedIndex++;
        setTimeout(() => { btn.innerText = originalText; btn.classList.remove('applied'); }, 1200);
    };

    document.getElementById('resetBtn').onclick = () => {
        if(!confirm("確定要清除所有已設定的特效角色嗎？")) return;
        saveToHistory();
        roster.forEach(g => { g.chars.forEach(c => { document.getElementById(`event_type_${c}`).value = '0'; }); });
        document.querySelectorAll('.char-chk, .country-chk').forEach(c => c.checked = false);
        updateVisuals();
    };

    document.getElementById('undoBtn').onclick = () => {
        if (stateHistory.length === 0) return;
        const state = stateHistory.pop();
        roster.forEach(g => { g.chars.forEach(c => { document.getElementById(`event_type_${c}`).value = state[c]; }); });
        if (stateHistory.length === 0) document.getElementById('undoBtn').disabled = true;
        updateVisuals();
    };

    function calculateBonus() {
        const awakenedBase = parseInt(document.getElementById('awakenedStar').value);
        let cardBonusTotal = 0; let detailsHtml = ""; const eventMap = {};
        roster.forEach(g => { g.chars.forEach(c => { const type = document.getElementById(`event_type_${c}`).value; if (type !== "0") eventMap[c] = type; }); });

        for (let i = 1; i <= 5; i++) {
            const charName = document.getElementById(`ownChar_${i}`).value;
            const lbLevel = parseInt(document.getElementById(`ownLevel_${i}`).value);
            if (charName !== '0') {
                const parsed = parseCharName(charName);
                if (eventMap[charName]) {
                    const typeId = eventMap[charName]; const base = cardBaseRates[typeId].rate; const typeName = cardBaseRates[typeId].name;
                    const bonus = base + (base * lbLevel); cardBonusTotal += bonus;
                    detailsHtml += `<div style="margin-bottom:6px; border-bottom: 1px dashed #e5e0eb; padding-bottom: 4px;">✦ 自己的 <b>${parsed.jp}</b> <span style="font-size:12px; color:#8b8396;">${parsed.tw}</span> <span style="color:#8b8396; font-size:12px; margin-left:5px;">(${typeName}, ${lbLevel}凸)</span> <span style="float:right; color:#c69f53; font-weight:bold;">+${bonus}%</span></div>`;
                } else {
                    detailsHtml += `<div style="margin-bottom:6px; border-bottom: 1px dashed #e5e0eb; padding-bottom: 4px; color:#8b8396;">✦ 自己的 <b>${parsed.jp}</b> <span style="font-size:12px; color:#8b8396;">${parsed.tw}</span> <span style="font-size:12px; margin-left:5px;">(無特效)</span> <span style="float:right;">+0%</span></div>`;
                }
            }
        }

        const friendChar = document.getElementById('friendChar').value;
        if (friendChar !== '0') {
            const parsed = parseCharName(friendChar);
            if (eventMap[friendChar]) {
                const typeId = eventMap[friendChar]; const base = cardBaseRates[typeId].rate; const typeName = cardBaseRates[typeId].name;
                cardBonusTotal += base;
                detailsHtml += `<div style="margin-bottom:6px; border-bottom: 1px dashed #e5e0eb; padding-bottom: 4px;">✦ 好友支援 <b>${parsed.jp}</b> <span style="font-size:12px; color:#8b8396;">${parsed.tw}</span> <span style="color:#8b8396; font-size:12px; margin-left:5px;">(${typeName})</span> <span style="float:right; color:#c69f53; font-weight:bold;">+${base}%</span></div>`;
            } else {
                detailsHtml += `<div style="margin-bottom:6px; border-bottom: 1px dashed #e5e0eb; padding-bottom: 4px; color:#8b8396;">✦ 好友支援 <b>${parsed.jp}</b> <span style="font-size:12px; color:#8b8396;">${parsed.tw}</span> <span style="font-size:12px; margin-left:5px;">(無特效)</span> <span style="float:right;">+0%</span></div>`;
            }
        }

        let cappedCardBonus = cardBonusTotal; let isCapped = false;
        if (cardBonusTotal > 60) { cappedCardBonus = 60; isCapped = true; }
        const finalTotal = awakenedBase + cappedCardBonus;

        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('finalResult').innerText = `+${finalTotal}%`;
        
        let summaryText = `<div style="font-size: 14px; margin-bottom: 8px;">`;
        summaryText += `覺醒目標加成: <b>+${awakenedBase}%</b><br>卡片編成合計: <b>+${cardBonusTotal}%</b>`;
        if (isCapped) { summaryText += ` <span style="color:#e74c3c; font-size:12px;">(超過上限，強制以最大值 60% 採計)</span>`; } 
        else { summaryText += ` <span style="color:#8b8396; font-size:12px;">(未達 60% 上限)</span>`; }
        summaryText += `</div>`;
        
        document.getElementById('detailResult').innerHTML = summaryText + "<div class='detail-box'>" + (detailsHtml || "尚未編成任何角色") + "</div>";
    }
</script>
